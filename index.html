<!DOCTYPE html>
<html lang="ru">
<head>
  <!-- Основные мета -->
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- SEO / Open Graph / Twitter -->
  <title>Заголовок</title>
  <meta name="description" content="Демонстрационная страница с большинством HTML тегов и атрибутов.">
  <meta name="keywords" content="HTML, пример, шаблон, meta, accessibility">
  <meta name="author" content="Имя Автора">

  <!-- Open Graph -->
  <meta property="og:title" content="Пример полной HTML-страницы">
  <meta property="og:description" content="Демонстрационная страница с большинством HTML тегов и атрибутов.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://example.com/">
  <meta property="og:image" content="https://example.com/preview.png">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Пример полной HTML-страницы">
  <meta name="twitter:description" content="Демонстрационная страница с большинством HTML тегов и атрибутов.">

  <!-- Canonical -->
  <link rel="canonical" href="https://example.com/">

  <!-- Favicon и иконки -->
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <!-- Подключение CSS -->
  <link rel="stylesheet" href="styles.css" integrity="" crossorigin="anonymous">

  <!-- Preconnect / Prefetch -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="//example-cdn.com">

  <!-- Политики безопасности (пример, менять по необходимости) -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https:;">
</head>
<body>
</body>
</html>
